<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的 Gemini</title>


<style>
[data-theme="dark"]{
  --bg:#0f0f0f;--sidebar:#161616;--surface:#1e1e1e;--border:#2a2a2a;
  --text:#e8e8e8;--text-dim:#777;--accent:#4f8ef7;--accent-soft:rgba(79,142,247,.15);
  --user-bg:#1a2a4a;--user-border:rgba(79,142,247,.25);--ai-bg:#1e1e1e;
  --hover:#252525;--active:#1c2d4a;--code:#111;--shadow:rgba(0,0,0,.5);
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;
}
[data-theme="light"]{
  --bg:#fff;--sidebar:#f8f9fa;--surface:#f1f3f4;--border:#e0e0e0;
  --text:#1f1f1f;--text-dim:#888;--accent:#1a73e8;--accent-soft:rgba(26,115,232,.08);
  --user-bg:#e8f0fe;--user-border:rgba(26,115,232,.2);--ai-bg:#fff;
  --hover:#efefef;--active:#d2e3fc;--code:#f6f8fa;--shadow:rgba(0,0,0,.08);
  --green:#16a34a;--red:#dc2626;--orange:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;transition:background .3s,color .3s;}

/* ===== 设置页 ===== */
#setup-page{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:500px;box-shadow:0 24px 64px var(--shadow);}
.setup-logo{font-size:28px;margin-bottom:12px;}
.setup-card h1{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.setup-card>p{color:var(--text-dim);font-size:13px;margin-bottom:28px;line-height:1.6;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;}
.field input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:monospace;outline:none;transition:border .2s;}
.field input:focus{border-color:var(--accent);}
.setup-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;transition:opacity .2s;}
.setup-btn:hover{opacity:.88;}
.setup-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}
.setup-note{font-size:11px;color:var(--text-dim);margin-top:14px;line-height:1.6;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);}

/* ===== 侧边栏 ===== */
#sidebar{width:260px;min-width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;transition:background .3s,border-color .3s;}
.sidebar-top{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;}
.sidebar-top h2{font-size:14px;font-weight:600;flex:1;}
.icon-round{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.icon-round:hover{border-color:var(--accent);}
.new-btn{margin:10px 10px 4px;padding:10px 14px;background:var(--accent-soft);border:1px solid rgba(79,142,247,.3);border-radius:8px;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:background .2s;}
.new-btn:hover{background:rgba(79,142,247,.2);}
.sessions{flex:1;overflow-y:auto;padding:4px 8px;}
.sessions::-webkit-scrollbar{width:3px;}
.sessions::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.s-item{padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .15s;display:flex;align-items:center;gap:8px;group:true;}
.s-item:hover{background:var(--hover);}
.s-item.active{background:var(--active);}
.s-item .s-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.s-item .s-actions{display:none;gap:4px;flex-shrink:0;}
.s-item:hover .s-actions,.s-item.active .s-actions{display:flex;}
.s-act{width:22px;height:22px;background:transparent;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background .15s;color:var(--text-dim);}
.s-act:hover{background:var(--surface);color:var(--text);}
.sidebar-bottom{padding:10px;border-top:1px solid var(--border);}
.cfg-btn{width:100%;padding:8px 12px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:all .2s;}
.cfg-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ===== 主区域 ===== */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.chat-head{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0;}
.chat-head-title{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge{font-size:11px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:20px;white-space:nowrap;}
.toggle-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--text-dim);background:var(--surface);transition:all .2s;user-select:none;white-space:nowrap;}
.toggle-pill:hover{border-color:var(--green);}
.toggle-pill.on{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.07);}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;transition:opacity .2s;}
.toggle-pill.on .dot{opacity:1;}

/* ===== 消息 ===== */
#msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:18px;}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{display:flex;gap:10px;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}
.ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}
.msg.user .ava{background:linear-gradient(135deg,#4f8ef7,#a78bfa);color:#fff;}
.msg.ai .ava{background:var(--surface);border:1px solid var(--border);color:var(--accent);}
.msg-wrap{display:flex;flex-direction:column;gap:4px;max-width:70%;}
.msg.user .msg-wrap{align-items:flex-end;}
.bubble{padding:11px 15px;border-radius:14px;line-height:1.75;font-size:14px;}
.msg.user .bubble{background:var(--user-bg);border:1px solid var(--user-border);border-bottom-right-radius:4px;}
.msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 3px var(--shadow);}
/* Markdown */
.bubble h1,.bubble h2,.bubble h3{font-weight:600;margin:12px 0 6px;line-height:1.3;}
.bubble h1{font-size:17px;} .bubble h2{font-size:15px;} .bubble h3{font-size:14px;}
.bubble p{margin-bottom:9px;} .bubble p:last-child{margin-bottom:0;}
.bubble ul,.bubble ol{padding-left:22px;margin:6px 0;}
.bubble li{margin-bottom:3px;}
.bubble blockquote{border-left:3px solid var(--accent);padding:4px 12px;color:var(--text-dim);margin:8px 0;border-radius:0 4px 4px 0;background:var(--surface);}
.bubble table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px;}
.bubble th,.bubble td{border:1px solid var(--border);padding:6px 10px;}
.bubble th{background:var(--surface);font-weight:600;}
.bubble code:not(pre code){background:var(--code);padding:2px 5px;border-radius:4px;font-family:monospace;font-size:13px;}
.bubble pre{background:var(--code)!important;border:1px solid var(--border);border-radius:8px;margin:10px 0;overflow:hidden;position:relative;}
.bubble pre code{font-size:13px;padding:14px!important;display:block;overflow-x:auto;}
.bubble a{color:var(--accent);}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
.bubble strong{font-weight:600;}
/* 图片 */
.bubble .chat-img{max-width:100%;max-height:260px;border-radius:8px;display:block;margin-bottom:8px;cursor:zoom-in;}
/* AI生成图片 */
.gen-img-wrap{margin-top:8px;}
.gen-img-wrap img{max-width:100%;border-radius:10px;display:block;cursor:zoom-in;}
.gen-img-wrap .img-caption{font-size:11px;color:var(--text-dim);margin-top:5px;}
/* 搜索标记 */
.search-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:2px 8px;border-radius:20px;margin-bottom:8px;}
/* 消息操作 */
.msg-actions{display:none;gap:4px;}
.msg-wrap:hover .msg-actions{display:flex;}
.m-act{padding:3px 7px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;color:var(--text-dim);transition:all .15s;font-family:inherit;}
.m-act:hover{border-color:var(--accent);color:var(--accent);}
/* typing */
.typing{display:flex;gap:5px;align-items:center;padding:3px 0;}
.typing span{width:6px;height:6px;background:var(--text-dim);border-radius:50%;animation:bou 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes bou{0%,60%,100%{transform:none}30%{transform:translateY(-5px)}}
/* 欢迎 */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-dim);text-align:center;padding:40px;}
.welcome .wi{font-size:48px;opacity:.25;}
.welcome h3{font-size:18px;font-weight:500;color:var(--text);opacity:.45;}
.welcome p{font-size:13px;max-width:280px;line-height:1.6;}
.welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.chip{padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;color:var(--text-dim);}
.chip:hover{border-color:var(--accent);color:var(--accent);}

/* ===== 输入区 ===== */
#input-wrap{padding:10px 20px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;}
#img-previews{display:none;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.prev-item{position:relative;}
.prev-item img{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block;}
.prev-rm{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.input-row{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;transition:border .2s,background .3s;}
.input-row:focus-within{border-color:var(--accent);}
.tool-btn{width:32px;height:32px;background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;transition:all .2s;color:var(--text-dim);}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);}
.tool-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(245,158,11,.08);}
#inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit;resize:none;max-height:130px;line-height:1.5;min-height:22px;}
#inp::placeholder{color:var(--text-dim);}
.send-btn{width:32px;height:32px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0;transition:opacity .2s;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}
.hint{font-size:11px;color:var(--text-dim);text-align:center;margin-top:6px;}
#file-inp{display:none;}

/* ===== 图片灯箱 ===== */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;}

/* ===== 重命名弹窗 ===== */
#rename-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9000;}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:380px;box-shadow:0 16px 48px var(--shadow);}
.modal-card h3{font-size:15px;font-weight:600;margin-bottom:16px;}
.modal-card input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.modal-card input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.modal-btn{padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .2s;}
.modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.modal-btn:hover{opacity:.85;}

.loading-s{padding:16px;text-align:center;color:var(--text-dim);font-size:13px;}
</style>
<script>
// 内嵌 Markdown 解析器
function mdParse(text){
  if(typeof text!=='string')return String(text||'');
  var h=text;
  // 代码块 - 先处理避免内部被修改
  var codeBlocks=[];
  h=h.replace(/```[\s\S]*?```/g,function(m){
    codeBlocks.push(m);
    return '\x00CODE'+(codeBlocks.length-1)+'\x00';
  });
  // 行内代码
  var inlineCodes=[];
  h=h.replace(/`[^`\n]+`/g,function(m){
    inlineCodes.push('<code>'+m.slice(1,-1)+'</code>');
    return '\x00INLINE'+(inlineCodes.length-1)+'\x00';
  });
  // 标题
  h=h.replace(/^### (.+)$/mg,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/mg,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/mg,'<h1>$1</h1>');
  // 粗体斜体
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // 分割线
  h=h.replace(/^-{3,}$/mg,'<hr>');
  // 引用
  h=h.replace(/^> (.+)$/mg,'<blockquote>$1</blockquote>');
  // 列表
  h=h.replace(/^[*-] (.+)$/mg,'<li>$1</li>');
  h=h.replace(/(<li>.*<\/li>)/gs,function(m){return '<ul>'+m+'</ul>';});
  h=h.replace(/^\d+\. (.+)$/mg,'<li>$1</li>');
  // 链接
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  // 换行段落
  h=h.replace(/\n\n+/g,'</p><p>');
  h=h.replace(/\n/g,'<br>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p>(<(?:h[1-3]|ul|ol|pre|hr|blockquote))/g,'$1');
  h=h.replace(/(<\/(?:h[1-3]|ul|ol|pre|blockquote)>)<\/p>/g,'$1');
  h=h.replace(/<p><\/p>|<p><br><\/p>/g,'');
  // 还原行内代码
  h=h.replace(/\x00INLINE(\d+)\x00/g,function(_,i){return inlineCodes[parseInt(i)];});
  // 还原代码块
  h=h.replace(/\x00CODE(\d+)\x00/g,function(_,i){
    var m=codeBlocks[parseInt(i)];
    var code=m.replace(/^```\w*\n?/,'').replace(/```$/,'');
    return '<pre><code>'+code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>';
  });
  return h;
}
var marked={parse:mdParse};
</script>
</head>
<body>

<!-- 设置页 -->
<div id="setup-page">
  <div class="setup-card">
    <div class="setup-logo">✦</div>
    <h1>我的 Gemini</h1>
    <p>首次使用，填入你的配置（自动记住，下次无需重填）</p>
    <div class="field"><label>Supabase Project URL</label><input id="c-url" placeholder="https://xxxx.supabase.co"/></div>
    <div class="field"><label>Supabase anon key（eyJ 开头）</label><input id="c-key" placeholder="eyJhbGci..."/></div>
    <div class="field"><label>Gemini API Key</label><input id="c-gem" placeholder="AIza..."/></div>
    <button class="setup-btn" onclick="saveConfig()">开始使用</button>
    <div class="setup-err" id="s-err"></div>
    <div class="setup-note">⚠️ 使用 gemini-2.5-pro-preview 需要在 Google AI Studio 绑定付费账户</div>
  </div>
</div>

<!-- 重命名弹窗 -->
<div id="rename-modal">
  <div class="modal-card">
    <h3>重命名对话</h3>
    <input id="rename-inp" placeholder="输入新名称"/>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeRename()">取消</button>
      <button class="modal-btn primary" onclick="confirmRename()">确定</button>
    </div>
  </div>
</div>

<!-- 图片灯箱 -->
<div id="lightbox" onclick="closeLightbox()"><img id="lb-img" src=""></div>

<!-- 侧边栏 -->
<div id="sidebar">
  <div class="sidebar-top">
    <div class="logo">✦</div>
    <h2>我的 Gemini</h2>
    <button class="icon-round" id="theme-btn" onclick="toggleTheme()" title="切换主题">☀️</button>
  </div>
  <button class="new-btn" onclick="newChat()">＋ 新建对话</button>
  <div class="sessions" id="sessions"><div class="loading-s">加载中...</div></div>
  <div class="sidebar-bottom">
    <button class="cfg-btn" onclick="document.getElementById('import-file').click()" style="margin-bottom:6px;">📥 导入 sessions.json</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importSessions(event)"/>
    <button class="cfg-btn" onclick="resetConfig()">⚙ 修改配置</button>
  </div>
</div>

<!-- 主区域 -->
<div id="main">
  <div class="chat-head">
    <div class="chat-head-title" id="c-title">选择一个对话</div>
    <div class="toggle-pill" id="search-pill" onclick="toggleSearch()" title="开启后 Gemini 会联网搜索">
      <div class="dot"></div><span>联网搜索</span>
    </div>
    <div class="badge" id="model-badge">gemini-2.5-pro-preview</div>
  </div>

  <div id="msgs">
    <div class="welcome">
      <div class="wi">✦</div>
      <h3>欢迎回来</h3>
      <p>选择历史会话继续，或新建对话</p>
      <div class="welcome-chips">
        <div class="chip" onclick="quickPrompt('帮我写一首诗')">✍️ 写诗</div>
        <div class="chip" onclick="quickPrompt('给我讲个笑话')">😄 讲笑话</div>
        <div class="chip" onclick="quickPrompt('生成一张搞笑的猫咪表情包，配上文字：星期一综合症')">🎭 表情包</div>
        <div class="chip" onclick="quickPrompt('今天有什么新闻？')">🌐 最新新闻</div>
      </div>
    </div>
  </div>

  <div id="input-wrap">
    <div id="img-previews"></div>
    <div class="input-row">
      <button class="tool-btn" onclick="document.getElementById('file-inp').click()" title="上传图片">📎</button>
      <input type="file" id="file-inp" accept="image/*" multiple onchange="onImgSelect(event)"/>
      <button class="tool-btn" id="meme-btn" onclick="toggleMemeMode()" title="表情包模式：AI 直接生成图片">🎭</button>
      <textarea id="inp" placeholder="输入消息… Enter 发送，Shift+Enter 换行" rows="1"
        onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
    </div>
    <div class="hint" id="hint-txt">gemini-2.5-pro-preview · 对话自动保存云端</div>
  </div>
</div>

<script>
/* ===== 全局状态 ===== */
let SB_URL='', SB_KEY='', GM_KEY='';
let curId=null, curMsgs=[], busy=false;
let searchOn=false, memeMode=false;
let pendingImgs=[];
let renameTarget=null;

const MODEL_CHAT  = 'gemini-2.5-pro-preview-03-25';
const MODEL_IMG   = 'gemini-2.0-flash-preview-image-generation';

/* ===== marked 配置 ===== */


/* ===== 主题 ===== */
function toggleTheme(){
  const d=document.documentElement,dark=d.getAttribute('data-theme')==='dark',t=dark?'light':'dark';
  d.setAttribute('data-theme',t);
  document.getElementById('theme-btn').textContent=dark?'🌙':'☀️';

  ls('theme',t);
}
function applyTheme(){
  const t=lg('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-btn').textContent=t==='dark'?'☀️':'🌙';

}

/* ===== 联网搜索 ===== */
function toggleSearch(){
  searchOn=!searchOn;
  const p=document.getElementById('search-pill');
  p.classList.toggle('on',searchOn);
  p.querySelector('span').textContent=searchOn?'联网: 开':'联网搜索';
}

/* ===== 表情包模式 ===== */
function toggleMemeMode(){
  memeMode=!memeMode;
  const b=document.getElementById('meme-btn');
  b.classList.toggle('active',memeMode);
  b.title=memeMode?'表情包模式: 开（点击关闭）':'表情包模式（AI生成图片）';
  document.getElementById('inp').placeholder=memeMode?'描述你想要的表情包内容…':'输入消息… Enter 发送，Shift+Enter 换行';
  document.getElementById('hint-txt').textContent=memeMode?'🎭 表情包模式：AI 将直接生成图片':'gemini-2.5-pro-preview · 对话自动保存云端';
}

/* ===== 配置 ===== */
function saveConfig(){
  const u=document.getElementById('c-url').value.trim().replace(/\/$/,'');
  const k=document.getElementById('c-key').value.trim();
  const g=document.getElementById('c-gem').value.trim();
  const e=document.getElementById('s-err');
  if(!u||!k||!g){e.style.display='block';e.textContent='请填写所有字段';return;}
  ls('sb_url',u);ls('sb_key',k);ls('gm_key',g);
  SB_URL=u;SB_KEY=k;GM_KEY=g;
  document.getElementById('setup-page').style.display='none';
  loadSessions();
}
function resetConfig(){
  ['sb_url','sb_key','gm_key'].forEach(k=>localStorage.removeItem(k));
  document.getElementById('setup-page').style.display='flex';
}
function boot(){
  applyTheme();
  SB_URL=lg('sb_url')||''; SB_KEY=lg('sb_key')||''; GM_KEY=lg('gm_key')||'';
  if(SB_URL&&SB_KEY&&GM_KEY){document.getElementById('setup-page').style.display='none';loadSessions();}
}

/* ===== Supabase ===== */
async function sb(path,opt={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    ...opt,headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,...(opt.headers||{})}
  });
  if(r.status===204||r.status===201)return null;
  return r.json();
}
async function loadSessions(){
  const el=document.getElementById('sessions');
  el.innerHTML='<div class="loading-s">加载中…</div>';
  try{
    const d=await sb('sessions?select=id,title&order=updated_at.desc');
    el.innerHTML='';
    if(!d||!d.length){el.innerHTML='<div class="loading-s">暂无会话</div>';return;}
    d.forEach(s=>el.appendChild(mkSessionEl(s.id,s.title)));
  }catch{el.innerHTML='<div class="loading-s" style="color:var(--red)">加载失败</div>';}
}
function mkSessionEl(id,title){
  const item=document.createElement('div');
  item.className='s-item';item.dataset.id=id;item.dataset.title=title;
  item.innerHTML=`<span class="s-title">${esc(title)}</span>
    <span class="s-actions">
      <button class="s-act" title="重命名" data-action="rename">✏️</button>
      <button class="s-act" title="删除" data-action="delete">🗑️</button>
    </span>`;
  item.addEventListener('click',e=>{
    const act=e.target.closest('[data-action]');
    if(!act){openSession(id,title);return;}
    if(act.dataset.action==='rename')openRename(e,id,title);
    if(act.dataset.action==='delete')deleteSession(e,id);
  });
  return item;
}
async function openSession(id,title){
  document.querySelectorAll('.s-item').forEach(e=>e.classList.remove('active'));
  document.querySelector(`.s-item[data-id="${id}"]`)?.classList.add('active');
  document.getElementById('c-title').textContent=title;
  curId=id;
  const d=await sb(`sessions?id=eq.${id}&select=messages`);
  curMsgs=(d&&d[0]?.messages)||[];
  renderAll();
}
async function saveSess(){
  if(!curId)return;
  await sb(`sessions?id=eq.${curId}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({messages:curMsgs,updated_at:new Date().toISOString()})});
}
async function newChat(){
  const title='新对话 '+new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const id='chat-'+Date.now();
  curId=id;curMsgs=[];
  document.getElementById('c-title').textContent=title;
  await sb('sessions',{method:'POST',body:JSON.stringify({id,title,messages:[]})});
  const el=document.getElementById('sessions');
  const item=mkSessionEl(id,title);item.classList.add('active');
  document.querySelectorAll('.s-item').forEach(e=>e.classList.remove('active'));
  el.prepend(item);
  renderAll();
}
async function deleteSession(e,id){
  e.stopPropagation();
  if(!confirm('确认删除这个对话？'))return;
  await sb(`sessions?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':'return=minimal'}});
  document.querySelector(`.s-item[data-id="${id}"]`)?.remove();
  if(curId===id){curId=null;curMsgs=[];document.getElementById('c-title').textContent='选择一个对话';renderAll();}
}
function openRename(e,id,title){
  e.stopPropagation();renameTarget=id;
  document.getElementById('rename-inp').value=title;
  document.getElementById('rename-modal').style.display='flex';
  setTimeout(()=>document.getElementById('rename-inp').focus(),50);
}
function closeRename(){document.getElementById('rename-modal').style.display='none';}
async function confirmRename(){
  const t=document.getElementById('rename-inp').value.trim();
  if(!t||!renameTarget)return closeRename();
  await sb(`sessions?id=eq.${renameTarget}`,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({title:t})});
  const el=document.querySelector(`.s-item[data-id="${renameTarget}"] .s-title`);
  if(el)el.textContent=t;
  if(curId===renameTarget)document.getElementById('c-title').textContent=t;
  closeRename();
}

/* ===== 图片选择 ===== */
function onImgSelect(ev){
  Array.from(ev.target.files).forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    const r=new FileReader();
    r.onload=e=>{
      pendingImgs.push({b64:e.target.result.split(',')[1],mime:f.type,prev:e.target.result});
      renderPreviews();
    };
    r.readAsDataURL(f);
  });
  ev.target.value='';
}
function renderPreviews(){
  const a=document.getElementById('img-previews');
  a.style.display=pendingImgs.length?'flex':'none';
  a.innerHTML='';
  pendingImgs.forEach((img,i)=>{
    const d=document.createElement('div');d.className='prev-item';
    d.innerHTML=`<img src="${img.prev}"><button class="prev-rm" onclick="rmImg(${i})">×</button>`;
    a.appendChild(d);
  });
}
function rmImg(i){pendingImgs.splice(i,1);renderPreviews();}

/* ===== 渲染消息 ===== */
function renderAll(){
  const c=document.getElementById('msgs');
  if(!curMsgs.length){
    c.innerHTML=`<div class="welcome"><div class="wi">✦</div><h3>开始对话</h3><p>在下方输入你的消息</p>
      <div class="welcome-chips">
        <div class="chip" onclick="quickPrompt('帮我写一首诗')">✍️ 写诗</div>
        <div class="chip" onclick="quickPrompt('给我讲个笑话')">😄 讲笑话</div>
        <div class="chip" onclick="quickPrompt('生成一张搞笑的猫咪表情包，配上文字：星期一综合症')">🎭 表情包</div>
        <div class="chip" onclick="quickPrompt('今天有什么新闻？')">🌐 今日新闻</div>
      </div></div>`;
    return;
  }
  c.innerHTML='';
  curMsgs.forEach(m=>{
    if(!m.content&&!m.images&&!m.genImg)return;
    if(typeof m.content==='string'&&m.content.startsWith('错误:'))return;
    addBubble(m.role==='user'?'user':'ai',m.content||'',m.images||[],m.searched||false,m.genImg||null);
  });
  scrollEnd();
}
function addBubble(role,text,imgs=[],searched=false,genImg=null){
  const c=document.getElementById('msgs');
  c.querySelector('.welcome')?.remove();
  const d=document.createElement('div');d.className=`msg ${role}`;
  let html='';
  // 用户上传的图片
  imgs.forEach(img=>html+=`<img class="chat-img" src="data:${img.mime};base64,${img.b64}" onclick="openLightbox(this.src)">`);
  // 联网标记
  if(searched)html+=`<div class="search-badge">🌐 联网搜索结果</div>`;
  // 文字内容
  if(text)html+=role==='ai'?marked.parse(text):text.replace(/\n/g,'<br>');
  // AI生成图片
  if(genImg)html+=`<div class="gen-img-wrap"><img src="data:image/png;base64,${genImg}" onclick="openLightbox(this.src)"><div class="img-caption">✨ AI 生成图片（点击放大）</div></div>`;

  d.innerHTML=`<div class="ava">${role==='user'?'你':'✦'}</div>
    <div class="msg-wrap">
      <div class="bubble">${html}</div>
      <div class="msg-actions">
        <button class="m-act" onclick="copyMsg(this)">复制</button>
        ${role==='ai'?'':''}
      </div>
    </div>`;
  // 代码高亮

  c.appendChild(d);scrollEnd();
  return d;
}
function copyMsg(btn){
  const bubble=btn.closest('.msg-wrap').querySelector('.bubble');
  navigator.clipboard.writeText(bubble.innerText);
  btn.textContent='已复制！';setTimeout(()=>btn.textContent='复制',1500);
}
function scrollEnd(){const c=document.getElementById('msgs');c.scrollTop=c.scrollHeight;}
function quickPrompt(t){
  if(!curId){newChat().then(()=>{document.getElementById('inp').value=t;sendMsg();});}
  else{document.getElementById('inp').value=t;sendMsg();}
}

/* ===== 发送消息 ===== */
async function sendMsg(){
  if(busy)return;
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  const imgs=[...pendingImgs];
  if(!text&&!imgs.length)return;
  if(!curId)await newChat();

  inp.value='';autoH(inp);
  pendingImgs=[];renderPreviews();
  busy=true;document.getElementById('send-btn').disabled=true;

  // 存入记录
  const userMsg={role:'user',content:text,images:imgs.map(i=>({b64:i.b64,mime:i.mime}))};
  curMsgs.push(userMsg);
  addBubble('user',text,imgs.map(i=>({b64:i.b64,mime:i.mime})));

  // 表情包模式
  if(memeMode){
    await genMeme(text||'搞笑表情包');
    busy=false;document.getElementById('send-btn').disabled=false;return;
  }

  // 普通对话
  const typing=document.createElement('div');
  typing.className='msg ai';
  typing.innerHTML=`<div class="ava">✦</div><div class="msg-wrap"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  document.getElementById('msgs').appendChild(typing);scrollEnd();

  try{
    // 构建 contents
    const contents=[];
    curMsgs.slice(0,-1).filter(m=>m.content&&!m.content.startsWith('错误:')).forEach(m=>{
      const parts=[];
      if(m.images&&m.images.length)m.images.forEach(img=>parts.push({inlineData:{mimeType:img.mime,data:img.b64}}));
      if(m.content)parts.push({text:m.content});
      if(parts.length)contents.push({role:m.role==='user'?'user':'model',parts});
    });
    // 当前消息
    const curParts=[];
    if(imgs.length)imgs.forEach(img=>curParts.push({inlineData:{mimeType:img.mime,data:img.b64}}));
    if(text)curParts.push({text});
    contents.push({role:'user',parts:curParts});

    const body={contents,generationConfig:{maxOutputTokens:4096}};
    if(searchOn)body.tools=[{googleSearch:{}}];

    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_CHAT}:generateContent?key=${GM_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    const data=await res.json();
    typing.remove();

    const reply=data?.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'（无回复）';
    const wasSearched=!!(data?.candidates?.[0]?.groundingMetadata);
    curMsgs.push({role:'assistant',content:reply,searched:wasSearched});
    addBubble('ai',reply,[],wasSearched);
    await saveSess();
  }catch(e){
    typing.remove();
    addBubble('ai','⚠️ 请求失败：'+e.message);
  }
  busy=false;document.getElementById('send-btn').disabled=false;
  inp.focus();
}

/* ===== 表情包生成 ===== */
async function genMeme(prompt){
  const typing=document.createElement('div');
  typing.className='msg ai';
  typing.innerHTML=`<div class="ava">✦</div><div class="msg-wrap"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div><div style="font-size:12px;color:var(--text-dim);margin-top:6px;">🎭 正在生成图片...</div></div></div>`;
  document.getElementById('msgs').appendChild(typing);scrollEnd();

  try{
    const body={
      contents:[{role:'user',parts:[{text:`生成一张表情包图片：${prompt}。图片要搞笑幽默，可以加上文字。`}]}],
      generationConfig:{responseModalities:['TEXT','IMAGE']}
    };
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_IMG}:generateContent?key=${GM_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
    });
    const data=await res.json();
    typing.remove();

    let replyText='', genImgB64=null;
    (data?.candidates?.[0]?.content?.parts||[]).forEach(p=>{
      if(p.text)replyText+=p.text;
      if(p.inlineData?.data)genImgB64=p.inlineData.data;
    });

    if(!genImgB64&&!replyText){
      addBubble('ai','⚠️ 图片生成失败，可能是该模型暂不支持或 API Key 权限不足');
    } else {
      curMsgs.push({role:'assistant',content:replyText,genImg:genImgB64});
      addBubble('ai',replyText,[],false,genImgB64);
      await saveSess();
    }
  }catch(e){
    typing.remove();
    addBubble('ai','⚠️ 图片生成出错：'+e.message);
  }
  document.getElementById('send-btn').disabled=false;
}

/* ===== 图片灯箱 ===== */
function openLightbox(src){
  document.getElementById('lb-img').src=src;
  document.getElementById('lightbox').style.display='flex';
}
function closeLightbox(){document.getElementById('lightbox').style.display='none';}

/* ===== 键盘 & 工具 ===== */
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
function ls(k,v){localStorage.setItem(k,v);}
function lg(k){return localStorage.getItem(k);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 回车确认重命名
document.getElementById('rename-inp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename();});

// 导入sessions.json
async function importSessions(ev){
  const file=ev.target.files[0];if(!file)return;
  ev.target.value='';
  const text=await file.text();
  let sessions;
  try{sessions=JSON.parse(text);}catch{alert('文件格式错误');return;}
  if(!confirm(`共发现 ${sessions.length} 个会话，确认导入？已有的会话会更新，不会删除。`))return;
  let ok=0,fail=0;
  for(const s of sessions){
    try{
      const r=await fetch(`${SB_URL}/rest/v1/sessions`,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({id:s.id,title:s.title||'无标题',messages:s.messages||[]})
      });
      (r.ok||r.status===201||r.status===200)?ok++:fail++;
    }catch{fail++;}
  }
  alert(`导入完成！成功 ${ok} 个，失败 ${fail} 个`);
  loadSessions();
}
boot();
</script>
